<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Administrativo | Inmoexpress</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/PZwXbsPB/Logo-blanco-vertical-INMO-EXPRESS-p.png">
    

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    

    <link rel="stylesheet" href="admin.css">
</head>
<body>


    <div id="login-section" class="admin-container">
        <div class="login-box">
            <div class="brand-logo" style="margin-bottom: 20px;">
                <img src="https://i.ibb.co/PZwXbsPB/Logo-blanco-vertical-INMO-EXPRESS-p.png" alt="Logo INMO EXPRESS" style="max-width: 250px;">
            </div>
            <h2>Portal de Gestión</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" id="username" required placeholder="admin / veronica / marco">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required placeholder="Ingresa tu contraseña">
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
                <p id="login-error" class="error-text" style="display: none;">Usuario o contraseña incorrectos.</p>
            </form>
        </div>
    </div>


    <div id="dashboard-section" class="admin-dashboard" style="display: none;">
        <nav class="admin-nav">
            <div class="brand-logo" style="display: flex; align-items: center; gap: 10px; color:white; font-size: 1.2rem;">
                <img src="https://i.ibb.co/PZwXbsPB/Logo-blanco-vertical-INMO-EXPRESS-p.png" alt="Logo INMO EXPRESS" style="max-height: 40px;">
                Admin
            </div>
            <div class="user-info">
                <span id="current-user-display">Usuario</span>
                <button id="logout-btn" class="btn-outline-sm"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="sidebar">
                <ul class="admin-menu">
                    <li class="active" data-target="properties-tab"><i class="fa-solid fa-house"></i> Propiedades</li>
                    <li id="log-menu-item" style="display: none;" data-target="log-tab"><i class="fa-solid fa-clipboard-list"></i> Bitácora</li>
                </ul>
            </div>

            <div class="main-panel">
                

                <div id="properties-tab" class="tab-content active">
                    <div class="panel-header">
                        <h2>Gestión de Inventario</h2>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-outline-sm" id="btn-export-csv"><i class="fa-solid fa-download"></i> Exportar CSV</button>
                            <button class="btn-outline-sm" id="btn-import-csv" onclick="document.getElementById('csv-file-input').click()"><i class="fa-solid fa-upload"></i> Importar CSV</button>
                            <input type="file" id="csv-file-input" accept=".csv" style="display:none;">
                            <button class="btn-primary" id="btn-add-property"><i class="fa-solid fa-plus"></i> Nueva Propiedad</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Título</th>
                                    <th>Precio</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="properties-tbody">

                            </tbody>
                        </table>
                    </div>
                </div>


                <div id="log-tab" class="tab-content" style="display: none;">
                    <div class="panel-header">
                        <h2>Bitácora de Actividades</h2>
                        <button class="btn-outline-sm" id="btn-clear-logs" style="border-color: #e74c3c; color: #e74c3c;"><i class="fa-solid fa-trash"></i> Limpiar Historial</button>
                    </div>
                    <div class="table-container">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Fecha y Hora</th>
                                    <th>Usuario</th>
                                    <th>Acción Realizada</th>
                                </tr>
                            </thead>
                            <tbody id="log-tbody">

                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content admin-modal" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 id="modal-title">Editar Propiedad</h3>
                <button class="close-modal" id="close-edit-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="input-grid">
                    <div class="input-group">
                        <label>Título de la Propiedad</label>
                        <input type="text" id="edit-title" required>
                    </div>
                    <div class="input-group">
                        <label>Código Interno (ej. REF-100)</label>
                        <input type="text" id="edit-code" placeholder="Solo visible en admin">
                    </div>
                </div>
                <div class="input-group">
                    <label>Descripción</label>
                    <textarea id="edit-description" rows="3" style="width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-family: var(--font-body);"></textarea>
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Precio (ej. Q. 12,000,000)</label>
                        <input type="text" id="edit-price" required>
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select id="edit-status">
                            <option value="disponible">Disponible</option>
                            <option value="nueva">Nueva</option>
                            <option value="oferta">Oferta</option>
                            <option value="vendida">Vendida</option>
                        </select>
                    </div>
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Habitaciones (ej. 3)</label>
                        <input type="number" id="edit-beds">
                    </div>
                    <div class="input-group">
                        <label>Baños (ej. 2.5)</label>
                        <input type="number" step="0.5" id="edit-baths">
                    </div>
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Área (ej. 250 m²)</label>
                        <input type="text" id="edit-area">
                    </div>
                    <div class="input-group">
                        <label>Ubicación Corta (ej. Zona 14)</label>
                        <input type="text" id="edit-location">
                    </div>
                </div>
                <div class="input-group">
                    <label>Enlace de Google Maps (URL)</label>
                    <input type="url" id="edit-gmaps">
                </div>
                <div class="input-group">
                    <label>Imágenes (Rutas o URLs separadas por coma)</label>
                    <input type="text" id="edit-images" placeholder="ej: assets/casa1.png, https://link.com/foto.jpg" required>
                </div>
                <button type="submit" class="btn-primary w-100" style="margin-top: 20px;">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
