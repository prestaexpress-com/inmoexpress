    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('full-properties-grid');
            const searchLocation = document.getElementById('search-location');
            const btnSearch = document.getElementById('btn-search');

            // Insertar contenedor de mensajes
            const messageContainer = document.createElement('div');
            messageContainer.id = 'search-message';
            grid.parentNode.insertBefore(messageContainer, grid);

            function renderGrid(propsToRender, message = '', isClosest = false) {
                grid.innerHTML = '';
                messageContainer.innerHTML = message;

                if (propsToRender.length === 0) {
                    messageContainer.innerHTML = '<span style="color: #ff4d4d;"><i class="fa-solid fa-circle-xmark"></i> Lo sentimos, no encontramos propiedades. Intente con otra búsqueda.</span>';
                    return;
                }

                propsToRender.forEach(prop => {
                    const isSold = prop.status === 'vendida';
                    const statusLabel = prop.status.charAt(0).toUpperCase() + prop.status.slice(1);
                    const statusClass = `status-${prop.status}`;

                    const card = document.createElement('div');
                    card.className = `property-card ${isSold ? 'is-sold' : ''}`;
                    card.dataset.id = prop.id;
                    card.style.animation = 'fadeInUp 0.5s ease forwards';

                    let statusHtml = '';
                    if (prop.status !== 'disponible') {
                        statusHtml = `<div class="property-status ${statusClass}">${statusLabel}</div>`;
                    }

                    let closestHtml = isClosest ? `<div class="closest-badge"><i class="fa-solid fa-location-arrow"></i> Opción Sugerida Cercana</div>` : '';

                    card.innerHTML = `
                        ${statusHtml}
                        <div class="property-image">
                            <img src="${prop.images[0]}" alt="${prop.title}">
                        </div>
                        <div class="property-overlay">
                            ${closestHtml}
                            <div class="property-location">${prop.location}</div>
                            <h3 class="property-title">${prop.title}</h3>
                            <div class="property-price">${prop.price}</div>
                        </div>
                    `;

                    card.addEventListener('click', () => {
                        if (!isSold) {
                            openModal(prop);
                        }
                    });

                    grid.appendChild(card);
                });
            }

            // Initial render
            renderGrid(properties);

            // Algoritmo de Búsqueda Inteligente
            function performSearch() {
                const query = searchLocation.value.toLowerCase().trim();

                if (!query) {
                    renderGrid(properties, '');
                    return;
                }

                // Normalizar texto para ignorar tildes y mayúsculas
                const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const normalizedQuery = normalize(query);

                // 1. Buscar coincidencias exactas o parciales
                const exactMatches = properties.filter(p => {
                    const loc = normalize(p.location.toLowerCase());
                    const title = normalize(p.title.toLowerCase());
                    const desc = normalize(p.description.toLowerCase());
                    return loc.includes(normalizedQuery) || title.includes(normalizedQuery) || desc.includes(normalizedQuery);
                });

                if (exactMatches.length > 0) {
                    renderGrid(exactMatches, `<span style="color: #25D366;"><i class="fa-solid fa-check-circle"></i> Encontramos ${exactMatches.length} propiedad(es) en o cerca de <strong>${searchLocation.value}</strong></span>`, false);
                } else {
                    // 2. Algoritmo de alternativas (Si no hay exacto, muestra sugerencias)
                    const availableAlternatives = properties.filter(p => p.status !== 'vendida').slice(0, 3);

                    if (availableAlternatives.length > 0) {
                        renderGrid(availableAlternatives,
                            `<span style="color: var(--accent);"><i class="fa-solid fa-circle-exclamation"></i> Por el momento no tenemos propiedades exactas en <strong>${searchLocation.value}</strong>.<br>Sin embargo, le mostramos estas excelentes <strong>opciones sugeridas</strong>:</span>`,
                            true
                        );
                    } else {
                        renderGrid(properties.slice(0, 3), `<span style="color: var(--accent);"><i class="fa-solid fa-circle-exclamation"></i> No encontramos propiedades exactas en <strong>${searchLocation.value}</strong>. Le mostramos nuestro top 3 general:</span>`, true);
                    }
                }
            }

            btnSearch.addEventListener('click', performSearch);

            searchLocation.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                } else if (searchLocation.value.trim().length > 2) {
                    // Búsqueda en vivo (as you type)
                    performSearch();
                } else if (searchLocation.value.trim().length === 0) {
                    performSearch();
                }
            });
        });
    </script>
